<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gropind Tags</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: dimgray;
            margin: 0;
        }

        header {
            background-color: white;
            padding: 10px;
            margin: 10px;
        }

        main {
            background-color: white;
            box-shadow: 4px 4px 9px 0px rgba(0, 0, 0, 0.488);
            border-radius: 1px 12px;
            padding: 10px;
            margin: 10px;
        }

        footer {
            text-align: center;
            background-color: rgb(0, 0, 63);
            color: white;
            padding: 1px;
        }

        footer > p {
            margin: 0px;
        }

        article {
            background-color: lightgray;
            padding: 10px;
        }

        article > aside {
            background-color: rgb(105, 105, 105);
        }

        nav {
            box-shadow: 2px 2px 1px rgba(0, 0, 0, 0.422);
            background-color: rgb(58, 58, 58);
        }

        nav > a {
            text-decoration: none;
            color: white;
            margin-right: 5px;
        }

        nav > a:hover {
            text-decoration: underline;
        }

        div#bola {
            height: 100px;
            width: 100px;
            border-radius: 50px;
            box-shadow: 0px 0px 50px rgb(255, 242, 0);
            background-color: white;
            margin: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Meu site</h1>
        <nav>
            <a href="#">link01</a>
            <a href="#">link02</a>
            <a href="#">link03</a>
            <a href="#">link04</a>
            <a href="#">link05</a>
        </nav>
    </header>
    <main>
        <section id="assuntos">

        </section>
        <section id="noticias">
            <article>
                <h2>Teste</h2>
                <aside>
                    <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Sint dolore ratione et nam animi ut ab, quasi porro nobis repellat eum. Corporis provident illo accusamus quaerat quasi dignissimos nostrum officia.</p>
                </aside>
            </article>
        </section>

    </main>
    <footer>
        <p>Artigo escrito por <strong>Gabriel</strong></p> 
    </footer>
    <div id="bola"></div>
</body>
</html>
